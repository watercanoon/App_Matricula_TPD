version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: matricula-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password_seguro
      MYSQL_DATABASE: matricula_db
      MYSQL_USER: matricula_user
      MYSQL_PASSWORD: matricula_password
      TZ: America/Lima
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis-cache:
    image: redis:7.2-alpine
    container_name: matricula-redis
    restart: always
    environment:
      TZ: America/Lima
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  mysql_data:
  redis_data: